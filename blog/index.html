    :root { --text: #1a1a2e; --bg: #ffffff; --accent: #2563eb; --muted: #6b7280; --border: #e5e7eb; --card-bg: #f8fafc; }
    @media (prefers-color-scheme: dark) {
      :root { --text: #e2e8f0; --bg: #0f172a; --accent: #60a5fa; --muted: #94a3b8; --border: #334155; --card-bg: #1e293b; }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: var(--text); background: var(--bg); line-height: 1.6; }
    .blog-index { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .blog-nav { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
    .blog-nav a { color: var(--accent); text-decoration: none; font-size: 0.875rem; }
    .blog-index h1 { font-size: 2rem; font-weight: 800; margin-bottom: 2rem; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .post-card { display: flex; flex-direction: column; background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.75rem; overflow: hidden; text-decoration: none; color: inherit; transition: box-shadow 0.2s, transform 0.2s; }
    .post-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.12); transform: translateY(-2px); }
    .post-image { width: 100%; height: 180px; object-fit: cover; }
    .post-image-placeholder { width: 100%; height: 180px; background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #8b5cf6)); }
    .post-info { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; }
    .post-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.3; }
    .post-date { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
    .post-excerpt { font-size: 0.875rem; color: var(--muted); line-height: 1.5; flex: 1; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  </style>
