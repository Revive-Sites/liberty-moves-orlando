    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success && d.url) { window.location.href = d.url; }
      else { alert('Checkout error: ' + (d.error || 'unknown')); if (btn){ btn.disabled=false; btn.textContent='Checkout →'; } }
    })
    .catch(function(e){
      alert('Network error: ' + e.message);
      if (btn){ btn.disabled=false; btn.textContent='Checkout →'; }
    });
  }

  // /checkout/success page — clear cart
  if (window.location.pathname.indexOf('/checkout/success') === 0) {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
    renderBadge();
    var host = document.querySelector('main') || document.body;
    if (host) {
      host.innerHTML = '<div style="max-width:560px;margin:4rem auto;padding:3rem 2rem;text-align:center;background:var(--bg-alt,#f8fafc);border-radius:1rem;"><div style="font-size:4rem;margin-bottom:1rem;">🎉</div><h1 style="font-size:2rem;font-weight:800;margin-bottom:0.75rem;">Thank you!</h1><p style="color:#6b7280;margin-bottom:1.5rem;">Your order has been received. You should have a confirmation email shortly.</p><a href="/" style="display:inline-block;padding:0.75rem 1.5rem;background:var(--accent,#2563eb);color:#fff;border-radius:0.625rem;text-decoration:none;font-weight:700;">Back to home</a></div>';
    }
  }

  function escHtml(s){ s = String(s==null?'':s); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s){ s = String(s==null?'':s); return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

  renderBadge();
})();</script>
<!-- REVIVE_OS_CART_END -->
</body>
</html>
